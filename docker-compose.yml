version: '3.8'

services:
  # PostgreSQL — multi-tenant from day one
  postgres:
    image: postgres:16-alpine
    container_name: haip-postgres
    environment:
      POSTGRES_USER: haip
      POSTGRES_PASSWORD: haip
      POSTGRES_DB: haip
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./keycloak/init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U haip']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — session cache, rate caching, pub/sub for events, BullMQ
  redis:
    image: redis:7-alpine
    container_name: haip-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak — OIDC provider for authentication & RBAC
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: haip-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: haip
      KC_DB_PASSWORD: haip
      KC_HEALTH_ENABLED: 'true'
    volumes:
      - ./keycloak/haip-realm.json:/opt/keycloak/data/import/haip-realm.json:ro
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && cat <&3 | grep -q "UP"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # HAIP API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: haip-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://haip:haip@postgres:5432/haip
      REDIS_URL: redis://redis:6379
      STRIPE_MODE: mock
      # STRIPE_SECRET_KEY:
      # STRIPE_WEBHOOK_SECRET:
      AUTH_ENABLED: 'false'
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: haip
      KEYCLOAK_CLIENT_ID: haip-api
      BOOKING_COM_BASE_URL: http://mock-bookingcom:4000/ota
      BOOKING_COM_USERNAME: haip_test
      BOOKING_COM_PASSWORD: test_password
      BOOKING_COM_HOTEL_ID: MOCK_HOTEL_1
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # For local dev, mount source and use watch mode
    # volumes:
    #   - ./apps/api/src:/app/apps/api/src

  # Mock Booking.com Connectivity Partner API (optional, for channel testing)
  mock-bookingcom:
    build:
      context: ./tools/mock-bookingcom
      dockerfile: Dockerfile
    container_name: haip-mock-bookingcom
    environment:
      PORT: 4000
      AUTH_USER: haip_test
      AUTH_PASS: test_password
    ports:
      - '4000:4000'
    profiles:
      - channels

volumes:
  postgres-data:
  redis-data:
